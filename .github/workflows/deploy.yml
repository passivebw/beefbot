name: Deploy to BeefBot

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to BeefBot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 143.198.172.60
          username: root
          key: ${{ secrets.BEEFBOT_SSH_KEY }}
          script: |
            cd /opt/kalshi-bot
            git pull origin master
            venv/bin/pip install -q flask

            # Write Discord webhook to .env if not already present
            sed -i '/^DISCORD_WEBHOOK_URL=/d' .env 2>/dev/null; echo 'DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/1486535589980541040/RI-QVhCh36cRPkQSq5bAXMMRlgAbTt_xNeH5hJ-q9XeUCOVBRTeVu308eD0eKhS3Ep0G' >> .env

            # Stop old services
            systemctl stop kalshi-bot 2>/dev/null || true
            systemctl disable kalshi-bot 2>/dev/null || true
            systemctl stop kalshi-bot-risky 2>/dev/null || true
            systemctl disable kalshi-bot-risky 2>/dev/null || true

            # conservative - port 8001 - LIVE on BNB/DOGE/HYPE/ETH
            printf '[Unit]\nDescription=Kalshi Bot (conservative) LIVE\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile conservative --port 8001 --live --live-series KXBTC15M,KXSOL15M,KXBNB15M,KXDOGE15M\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/conservative.log\nStandardError=append:/opt/kalshi-bot/logs/conservative.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-conservative.service

            # moderate - port 8000
            printf '[Unit]\nDescription=Kalshi Bot (moderate)\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile moderate --port 8000\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/moderate.log\nStandardError=append:/opt/kalshi-bot/logs/moderate.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-moderate.service

            # risky-0m - port 8002
            printf '[Unit]\nDescription=Kalshi Bot (risky-0m) LIVE\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile risky-0m --port 8002 --live --live-series KXBNB15M,KXDOGE15M\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/risky-0m.log\nStandardError=append:/opt/kalshi-bot/logs/risky-0m.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-risky-0m.service

            # risky-1m - port 8003
            printf '[Unit]\nDescription=Kalshi Bot (risky-1m) LIVE\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile risky-1m --port 8003 --live --live-series KXBNB15M,KXDOGE15M\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/risky-1m.log\nStandardError=append:/opt/kalshi-bot/logs/risky-1m.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-risky-1m.service

            # risky-2m - port 8004
            printf '[Unit]\nDescription=Kalshi Bot (risky-2m) LIVE\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile risky-2m --port 8004 --live --live-series KXBNB15M,KXDOGE15M\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/risky-2m.log\nStandardError=append:/opt/kalshi-bot/logs/risky-2m.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-risky-2m.service

            # conservative-69 - port 8005 - LIVE on BNB/DOGE/HYPE/ETH
            printf '[Unit]\nDescription=Kalshi Bot (conservative-69) LIVE\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile conservative-69 --port 8005 --live --live-series KXBTC15M,KXSOL15M,KXBNB15M,KXDOGE15M\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/conservative-69.log\nStandardError=append:/opt/kalshi-bot/logs/conservative-69.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-conservative-69.service

            # moderate-rr12 - port 8006
            printf '[Unit]\nDescription=Kalshi Bot (moderate-rr12)\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile moderate-rr12 --port 8006\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/moderate-rr12.log\nStandardError=append:/opt/kalshi-bot/logs/moderate-rr12.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-moderate-rr12.service

            systemctl daemon-reload
            systemctl enable kalshi-bot-conservative kalshi-bot-moderate kalshi-bot-risky-0m kalshi-bot-risky-1m kalshi-bot-risky-2m kalshi-bot-conservative-69 kalshi-bot-moderate-rr12
            systemctl restart kalshi-bot-conservative kalshi-bot-moderate kalshi-bot-risky-0m kalshi-bot-risky-1m kalshi-bot-risky-2m kalshi-bot-conservative-69 kalshi-bot-moderate-rr12

            echo "Deploy complete: $(date)"
            systemctl is-active kalshi-bot-conservative kalshi-bot-moderate kalshi-bot-risky-0m kalshi-bot-risky-1m kalshi-bot-risky-2m kalshi-bot-conservative-69 kalshi-bot-moderate-rr12
