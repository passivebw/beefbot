name: Deploy to BeefBot

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to BeefBot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 143.198.172.60
          username: root
          key: ${{ secrets.BEEFBOT_SSH_KEY }}
          script: |
            cd /opt/kalshi-bot
            git pull origin master
            venv/bin/pip install -q flask

            # Write Discord webhook to .env if not already present
            sed -i '/^DISCORD_WEBHOOK_URL=/d' .env 2>/dev/null; echo 'DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/1486535589980541040/RI-QVhCh36cRPkQSq5bAXMMRlgAbTt_xNeH5hJ-q9XeUCOVBRTeVu308eD0eKhS3Ep0G' >> .env

            # Stop and disable removed profiles
            for svc in kalshi-bot kalshi-bot-risky kalshi-bot-risky-0m kalshi-bot-risky-1m kalshi-bot-risky-2m kalshi-bot-conservative-69 kalshi-bot-conservative kalshi-bot-moderate-rr12 kalshi-bot-og-risky kalshi-bot-risky-high-early kalshi-bot-risky-low kalshi-bot-risky-mid; do
              systemctl stop $svc 2>/dev/null || true
              systemctl disable $svc 2>/dev/null || true
            done

            # moderate - port 8000 - PAPER all 7 markets
            printf '[Unit]\nDescription=Kalshi Bot (moderate) PAPER\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile moderate --port 8000\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/moderate.log\nStandardError=append:/opt/kalshi-bot/logs/moderate.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-moderate.service

            # risky-high-late - port 8006 - PAPER all 7 markets
            printf '[Unit]\nDescription=Kalshi Bot (risky-high-late) PAPER\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile risky-high-late --port 8006\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/risky-high-late.log\nStandardError=append:/opt/kalshi-bot/logs/risky-high-late.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-risky-high-late.service

            # late-sniper - port 8007 - PAPER BTC+5 markets (excl HYPE+BNB)
            printf '[Unit]\nDescription=Kalshi Bot (late-sniper) PAPER\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile late-sniper --port 8007\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/late-sniper.log\nStandardError=append:/opt/kalshi-bot/logs/late-sniper.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-late-sniper.service

            systemctl daemon-reload
            systemctl enable kalshi-bot-moderate kalshi-bot-risky-high-late kalshi-bot-late-sniper
            systemctl restart kalshi-bot-moderate kalshi-bot-risky-high-late kalshi-bot-late-sniper

            echo "Deploy complete: $(date)"
            systemctl is-active kalshi-bot-moderate kalshi-bot-risky-high-late kalshi-bot-late-sniper
