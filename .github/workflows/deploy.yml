name: Deploy to BeefBot

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to BeefBot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 143.198.172.60
          username: root
          key: ${{ secrets.BEEFBOT_SSH_KEY }}
          script: |
            cd /opt/kalshi-bot
            git pull origin master
            venv/bin/pip install -q flask
            systemctl restart kalshi-bot
            echo "Deploy complete: $(date)"
