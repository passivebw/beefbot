name: Deploy to BeefBot

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to BeefBot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 143.198.172.60
          username: root
          key: ${{ secrets.BEEFBOT_SSH_KEY }}
          script: |
            cd /opt/kalshi-bot
            git pull origin master
            venv/bin/pip install -q flask

            # Stop old services
            systemctl stop kalshi-bot 2>/dev/null || true
            systemctl disable kalshi-bot 2>/dev/null || true
            systemctl stop kalshi-bot-risky 2>/dev/null || true
            systemctl disable kalshi-bot-risky 2>/dev/null || true

            # conservative - port 8001
            printf '[Unit]\nDescription=Kalshi Bot (conservative)\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile conservative --port 8001\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/conservative.log\nStandardError=append:/opt/kalshi-bot/logs/conservative.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-conservative.service

            # moderate - port 8000
            printf '[Unit]\nDescription=Kalshi Bot (moderate)\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile moderate --port 8000\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/moderate.log\nStandardError=append:/opt/kalshi-bot/logs/moderate.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-moderate.service

            # risky-0m - port 8002
            printf '[Unit]\nDescription=Kalshi Bot (risky-0m)\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile risky-0m --port 8002\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/risky-0m.log\nStandardError=append:/opt/kalshi-bot/logs/risky-0m.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-risky-0m.service

            # risky-1m - port 8003
            printf '[Unit]\nDescription=Kalshi Bot (risky-1m)\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile risky-1m --port 8003\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/risky-1m.log\nStandardError=append:/opt/kalshi-bot/logs/risky-1m.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-risky-1m.service

            # risky-2m - port 8004
            printf '[Unit]\nDescription=Kalshi Bot (risky-2m)\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/kalshi-bot\nExecStart=/opt/kalshi-bot/venv/bin/python3 v2/multi_scalper.py --profile risky-2m --port 8004\nRestart=on-failure\nRestartSec=10\nStandardOutput=append:/opt/kalshi-bot/logs/risky-2m.log\nStandardError=append:/opt/kalshi-bot/logs/risky-2m.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/kalshi-bot-risky-2m.service

            systemctl daemon-reload
            systemctl enable kalshi-bot-conservative kalshi-bot-moderate kalshi-bot-risky-0m kalshi-bot-risky-1m kalshi-bot-risky-2m
            systemctl restart kalshi-bot-conservative kalshi-bot-moderate kalshi-bot-risky-0m kalshi-bot-risky-1m kalshi-bot-risky-2m

            echo "Deploy complete: $(date)"
            systemctl is-active kalshi-bot-conservative kalshi-bot-moderate kalshi-bot-risky-0m kalshi-bot-risky-1m kalshi-bot-risky-2m
